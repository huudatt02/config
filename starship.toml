"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚ĖĎ‚Ėí‚Ėď](gray)\
$os\
[Óāī](fg:gray bg:blue)\
$directory\
[Óāī](fg:blue bg:slate_blue)\
$git_branch\
$git_status\
[Óāī](fg:slate_blue bg:dark_blue)\
$nodejs\
$rust\
$golang\
$java\
$python\
[Óāī](fg:dark_blue bg:black_blue)\
$time\
[Óāī ](fg:black_blue)\
$cmd_duration\
$line_break\
$character"""

palette = 'tokyonight'

[os]
disabled = false
style = "fg:text_black bg:gray"

[os.symbols]
Windows = " ůįĖ≥"
Ubuntu  = " ůįēą"
NixOS   = " ůĪĄÖ"
Mint    = " ůį£≠"
Macos   = " ůįÄĶ"
Linux   = " ůįĆĹ"
Fedora  = " ůį£õ"
Arch    = " ůį£á"
CentOS  = " ÓľĹ"
Debian  = " ůį£ö"
Redhat  = " ůĪĄõ"

[directory]
style = "fg:text_white bg:blue"
format = "[ $path]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
style = "fg:text_blue bg:slate_blue"
format = '[ $symbol $branch]($style)'

[git_status]
style = "fg:text_blue bg:slate_blue"
format = '[$all_status$ahead_behind]($style)'
conflicted = "[ Ôźô](fg:red bg:slate_blue)"
ahead = "[ ÔĄā${count}](fg:green bg:slate_blue)"
behind = "[ ÔĄÉ${count}](fg:yellow bg:slate_blue)"
diverged = "[ ÔĄā${ahead_count}](fg:green bg:slate_blue)[ ÔĄÉ${behind_count}](fg:yellow bg:slate_blue)"
untracked = "[ ÔĄ®](fg:red bg:slate_blue)"
stashed = "[ Ôíá](fg:blue bg:slate_blue)"
modified = "[ ÔĎĄ](fg:yellow bg:slate_blue)"
staged = "[ ÔÄĆ](fg:green bg:slate_blue)"
renamed = "[ ÔĀ°](fg:purple bg:slate_blue)"
deleted = "[ ÔÄć](fg:red bg:slate_blue)"

[nodejs]
symbol = "Óúė"
style = "fg:text_blue bg:dark_blue"
format = '[ $symbol ($version)]($style)'

[golang]
symbol = "Óėß"
style = "fg:text_blue bg:dark_blue"
format = '[ $symbol ($version)]($style)'

[java]
symbol = "ůį¨∑"
style = "fg:text_blue bg:dark_blue"
format = '[ $symbol ($version)]($style)'

[python]
symbol = "ůįĆ†"
style = "fg:text_blue bg:dark_blue"
format = '[ $symbol( $version)(\(#$virtualenv\))]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:text_gray bg:black_blue"
format = '[ Ôźļ $time]($style)'

[cmd_duration]
show_milliseconds = true
format = "ůįÄĚ in $duration"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[line_break]
disabled = false

[palettes.tokyonight]
text_black   = "#090c0c"
text_white   = "#e3e5e5"
text_blue    = "#769ff0"
text_gray    = "#a0a9cb"
gray         = "#a3aed2"
blue         = "#769ff0"
slate_blue   = "#394260"
dark_blue    = "#2a3448"
black_blue   = "#1d2230"

